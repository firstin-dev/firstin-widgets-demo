<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Guest Lists | FirstIn Widgets</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
      };
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="assets/css/style.css" />
    <script src="assets/js/config.js"></script>
  </head>
  <body
    class="bg-white dark:bg-black text-zinc-900 dark:text-zinc-100 min-h-screen flex flex-col"
  >
    <header id="main-header"></header>

    <main class="flex-grow pt-24 pb-20">
      <section class="max-w-7xl mx-auto px-6 py-12">
        <div class="mb-16">
          <h1 class="text-4xl font-extrabold mb-4">
            Guest List <span class="gradient-text">Widgets</span>
          </h1>
          <p class="text-zinc-500 max-w-2xl">
            Transform how your guests book VIP experiences. Our guest list
            widget provides a high-end booking flow that matches the luxury of
            your venue.
          </p>
        </div>

        <!-- Code Snippet Section -->
        <div>
          <firstin-widget type="guest_list" theme="light" height="800" />
        </div>
      </section>
    </main>

    <footer id="main-footer"></footer>

    <script src="assets/js/theme.js"></script>
    <script src="assets/js/layout.js"></script>
  </body>
</html>
