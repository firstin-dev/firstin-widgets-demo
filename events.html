<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Events Widgets | FirstIn Widgets</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
      };
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="assets/css/style.css" />
    <script src="assets/js/config.js"></script>
  </head>
  <body
    class="bg-white dark:bg-black text-zinc-900 dark:text-zinc-100 min-h-screen flex flex-col"
  >
    <header id="main-header"></header>

    <main class="flex-grow pt-24 pb-20">
      <section class="max-w-7xl mx-auto px-6 py-12">
        <div class="mb-16">
          <h1 class="text-4xl font-extrabold mb-4">
            Event <span class="gradient-text">Widgets</span>
          </h1>
          <p class="text-zinc-500 max-w-2xl">
            Showcase your events with our versatile layouts. Choose the one that
            fits your brand best.
          </p>
        </div>

        <!-- Grid Widget -->
        <div class="mb-20">
          <div class="flex items-center justify-between mb-8">
            <h2 class="text-2xl font-bold flex items-center">
              <i
                data-lucide="layout-grid"
                class="mr-3 text-zinc-900 dark:text-zinc-100"
              ></i>
              Grid View
            </h2>
          </div>
          <div>
            <firstin-widget type="events" theme="light" layout="grid" />
          </div>
        </div>

        <!-- List Widget -->
        <div class="mb-20">
          <div class="flex items-center justify-between mb-8">
            <h2 class="text-2xl font-bold flex items-center">
              <i
                data-lucide="list"
                class="mr-3 text-zinc-900 dark:text-zinc-100"
              ></i>
              List View
            </h2>
          </div>
          <div>
            <firstin-widget type="events" theme="light" layout="list" />
          </div>
        </div>

        <!-- Calendar Widget -->
        <div>
          <div class="flex items-center justify-between mb-8">
            <h2 class="text-2xl font-bold flex items-center">
              <i
                data-lucide="calendar"
                class="mr-3 text-zinc-900 dark:text-zinc-100"
              ></i>
              Calendar View
            </h2>
          </div>
          <div>
            <firstin-widget type="events" theme="light" layout="calendar" />
          </div>
        </div>
      </section>
    </main>

    <footer id="main-footer"></footer>

    <script src="assets/js/theme.js"></script>
    <script src="assets/js/layout.js"></script>
  </body>
</html>
